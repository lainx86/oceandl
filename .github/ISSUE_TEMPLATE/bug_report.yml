name: Bug report
description: Report a reproducible defect in oceandl
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include exact CLI command(s), config, and file paths if relevant.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and output
      description: Paste stderr/stdout and relevant stack traces.
      render: shell
  - type: input
    id: version
    attributes:
      label: oceandl version
      placeholder: "oceandl 0.2.0"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "Windows 11 / Ubuntu 24.04 / macOS 15"
    validations:
      required: true
