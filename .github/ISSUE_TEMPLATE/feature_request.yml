name: Feature request
description: Propose an enhancement for oceandl
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user pain or limitation does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior and CLI/API shape.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List other approaches and trade-offs.
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility notes
      description: Mention migration impact, defaults, and breaking behavior if any.
