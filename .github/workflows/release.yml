name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libcurl4-openssl-dev \
            libfmt-dev \
            libtomlplusplus-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja curl fmt tomlplusplus

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            throw "VCPKG_INSTALLATION_ROOT is not set."
          }
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            curl:x64-windows `
            fmt:x64-windows `
            tomlplusplus:x64-windows

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          if (-not $env:VCPKG_INSTALLATION_ROOT) { throw "VCPKG_INSTALLATION_ROOT is not set." };
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Pack artifact (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="oceandl-${RUNNER_OS,,}-x64.tar.gz"
          mkdir -p dist
          cp build/oceandl dist/
          cp README.md LICENSE CHANGELOG.md dist/
          tar -C dist -czf "$archive" oceandl README.md LICENSE CHANGELOG.md
          rm -rf dist

      - name: Pack artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item .\build\Release\oceandl.exe .\dist\oceandl.exe
          Copy-Item .\README.md, .\LICENSE, .\CHANGELOG.md .\dist\
          Compress-Archive -Path .\dist\* -DestinationPath .\oceandl-windows-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oceandl-${{ runner.os }}-artifact
          path: |
            oceandl-*.tar.gz
            oceandl-*.zip

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: oceandl-*-artifact
          merge-multiple: true

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/oceandl-*.tar.gz
            release-assets/oceandl-*.zip
