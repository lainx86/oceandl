name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            patchelf \
            libcurl4-openssl-dev \
            libfmt-dev \
            libtomlplusplus-dev

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DOCEANDL_ENABLE_RELEASE_BUNDLE=ON
          -DOCEANDL_EXTRA_BUNDLE_DIRS="/usr/lib;/usr/local/lib"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Pack artifact
        shell: bash
        run: |
          package_dir="$PWD/dist/oceandl-linux-x64"
          archive="oceandl-linux-x64.tar.gz"

          rm -rf "$package_dir"
          cmake --install build --prefix "$package_dir"

          tar -C "$PWD/dist" -czf "$archive" "oceandl-linux-x64"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oceandl-linux-artifact
          path: oceandl-linux-x64.tar.gz

  verify-artifacts:
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: oceandl-linux-artifact
          path: verify-assets

      - name: Smoke test final archive
        shell: bash
        run: |
          bash ./scripts/verify_release_archive.sh "verify-assets/oceandl-linux-x64.tar.gz"

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          name: oceandl-linux-artifact

      - name: Create formal source release archive
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash ./scripts/create_source_release.sh "$version" "release-assets/oceandl-src-v${version}.tar.gz"

      - name: Generate release checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum oceandl-*.tar.gz > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/oceandl-*.tar.gz
            release-assets/SHA256SUMS
