name: CI

on:
  push:
  pull_request:

jobs:
  strict-warnings:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libcurl4-openssl-dev \
            libfmt-dev \
            libtomlplusplus-dev

      - name: Configure strict warnings
        run: >
          cmake -S . -B build-strict -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DOCEANDL_STRICT_WARNINGS=ON

      - name: Build strict warnings
        run: cmake --build build-strict --parallel

      - name: Run tests with strict warnings
        run: ctest --test-dir build-strict --output-on-failure

  build-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libcurl4-openssl-dev \
            libfmt-dev \
            libtomlplusplus-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake ninja curl fmt tomlplusplus

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidateRoots = @()
          if ($env:VCPKG_INSTALLATION_ROOT) {
            $candidateRoots += $env:VCPKG_INSTALLATION_ROOT
          }
          $candidateRoots += @(
            "C:\vcpkg"
          )

          $vcpkgRoot = $null
          foreach ($candidate in $candidateRoots) {
            if (-not $candidate) {
              continue
            }
            if (
              (Test-Path (Join-Path $candidate "vcpkg.exe")) -or
              (Test-Path (Join-Path $candidate "bootstrap-vcpkg.bat"))
            ) {
              $vcpkgRoot = $candidate
              break
            }
          }

          if (-not $vcpkgRoot) {
            $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
            if (Test-Path $vcpkgRoot) {
              Remove-Item -Recurse -Force $vcpkgRoot
            }
            git clone --depth 1 https://github.com/microsoft/vcpkg.git "$vcpkgRoot"
          }

          if (-not (Test-Path (Join-Path $vcpkgRoot "vcpkg.exe"))) {
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }

          "VCPKG_INSTALLATION_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          & "$vcpkgRoot\vcpkg.exe" install `
            curl:x64-windows `
            fmt:x64-windows `
            tomlplusplus:x64-windows

      - name: Configure (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          if (-not $env:VCPKG_INSTALLATION_ROOT) { throw "VCPKG_INSTALLATION_ROOT is not set." };
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --parallel

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: CLI smoke test (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          ./build/oceandl --version
          ./build/oceandl datasets
          ./build/oceandl providers
          ./build/oceandl download --help

      - name: CLI smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\build\Release\oceandl.exe --version
          .\build\Release\oceandl.exe datasets
          .\build\Release\oceandl.exe providers
          .\build\Release\oceandl.exe download --help
