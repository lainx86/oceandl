name: CI

on:
  push:
  pull_request:

jobs:
  strict-warnings:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed archlinux-keyring
          pacman -S --noconfirm --needed \
            base-devel \
            cmake \
            ninja \
            curl \
            fmt \
            tomlplusplus \
            python \
            git

      - uses: actions/checkout@v4

      - name: Configure strict warnings
        run: >
          cmake -S . -B build-strict -G Ninja -DCMAKE_BUILD_TYPE=Release
          -DOCEANDL_STRICT_WARNINGS=ON

      - name: Build strict warnings
        run: cmake --build build-strict --parallel

      - name: Run tests with strict warnings
        run: ctest --test-dir build-strict --output-on-failure

  arch-build-test:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed archlinux-keyring
          pacman -S --noconfirm --needed \
            base-devel \
            cmake \
            ninja \
            curl \
            fmt \
            tomlplusplus \
            python \
            git

      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: CLI smoke test
        run: |
          ./build/oceandl --version
          ./build/oceandl datasets
          ./build/oceandl providers
          ./build/oceandl download --help

  aur-package:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed archlinux-keyring
          pacman -S --noconfirm --needed \
            base-devel \
            cmake \
            ninja \
            curl \
            fmt \
            tomlplusplus \
            python \
            git

      - uses: actions/checkout@v4

      - name: Verify AUR package path
        run: |
          version="$(awk '/^project\(oceandl VERSION / { print $3; exit }' CMakeLists.txt)"
          if [ -z "$version" ]; then
            echo "failed to read project version from CMakeLists.txt" >&2
            exit 1
          fi
          mkdir -p dist
          bash ./scripts/create_source_release.sh "$version" "dist/oceandl-src-v${version}.tar.gz"
          bash ./scripts/verify_arch_pkgbuild.sh "dist/oceandl-src-v${version}.tar.gz" packaging/arch/oceandl
